name: "Docker Build"
 
on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      deploy_tag: ${{ steps.deploy-tag.outputs.tag }}
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: photonixapp/photonix
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      -
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.prd
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      -
        name: Determine deploy tag
        id: deploy-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "tag=edge" >> $GITHUB_OUTPUT
          fi

  deploy-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up kubectl
        uses: azure/setup-kubectl@v3
      -
        name: Set up kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
      -
        name: Deploy
        run: |
          IMAGE=photonixapp/photonix:${{ needs.build-and-push.outputs.deploy_tag }}
          echo "Deploying image: $IMAGE"
          kubectl set image deployment/photonix-demo photonix-demo=$IMAGE -n photonix
      -
        name: Wait for pod to start
        run: |
          echo "Waiting for photonix-demo deployment to complete..."
          kubectl rollout status deployment/photonix-demo -n photonix --timeout=600s
